# Netlify deployment config for Trinity Classical Academy
#
# What this does:
# - Locks in the build command and publish directory so Netlify doesn't
#   have to guess. Astro's default output is `dist/`.
# - Sets the Node version explicitly so fontsource + @astrojs/sitemap
#   resolve correctly (Astro 6 + Node 22).
# - Declares the `contact` form so Netlify's build-time form detection
#   picks it up even if Astro's HTML transformation changes attributes.
# - Sets long-lived caching headers for bundled assets (immutable hash
#   filenames emitted by Astro into `/_astro/`) and conservative caching
#   for HTML.
# - Adds security headers by default.

[build]
  command   = "npm run build"
  publish   = "dist"
  functions = "netlify/functions"  # reserved, not currently used

[build.environment]
  NODE_VERSION = "22"

# ---------------------------------------------------------------------------
# Caching
# ---------------------------------------------------------------------------

# Bundled assets (JS, CSS, fonts, images) have content-hashed filenames, so
# they can be cached forever. Cache-busting is handled by the filename hash.
[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/videos/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# HTML files and the sitemap should revalidate on every request so content
# updates propagate quickly.
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/sitemap-*.xml"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Cache-Control = "public, max-age=3600"

# ---------------------------------------------------------------------------
# Security headers
# ---------------------------------------------------------------------------

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "camera=(), microphone=(), geolocation=()"
